name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Check formatting
        run: black --check house_monitor/ tests/ scripts/

      - name: Lint
        run: ruff check house_monitor/ tests/ scripts/

      - name: Type check
        run: mypy house_monitor/
